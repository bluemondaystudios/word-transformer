<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>The OneEleven Word Transformer</title>
        <style>

            body {
                font-family: Arial, sans-serif;
                background-color: #f5f5f5;
                color: #333;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 40px;
            }

            h1 {
                color: #2c3e50;


            }

            form {
                margin-top: 20px;
                display: flex;
                flex-direction: column;
                gap: 10px;
                width: 300px;
            }

            input {
                padding: 8px;
                font-size: 16px;
                border: 1px solid #ccc;
                border-radius: 4px;
            }

            button {
                padding: 10px;
                font-size: 16px;
                background-color: #3498db;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
            }

            button:hover {

                background-color:#2980b9;
            }

            pre {
                margin-top: 20px;
                padding: 10px;
                background-color: #ecf0f1;
                border-radius: 4px;
                width: 300px;
                overflow-x: auto;
            }


        </style>

    </head>
    <body>

        <h1> Welcome. You may enter a word.</h1>

        <form id="wordForm">
            
            <input type="text" id="wordInput" placeholder="Type here" />
            <button type="submit">Transform</button>
            
        </form>

        <pre id="result"></pre>

        <script>
            const form = document.getElementById("wordForm");
            const input = document.getElementById("wordInput");
            const result = document.getElementById("result");

            form.addEventListener("submit", async (e) => {e.preventDefault();

                const response = await fetch("/transform", {
                    method:"POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        data: input.value
                    })
                });

                const json = await response.json();
                result.textContent = JSON.stringify(json,);
            });


        </script>

    </body>
</html>
